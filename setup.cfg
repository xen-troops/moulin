[yapf]
column_limit = 100

[pylint.FORMAT]
max-line-length = 100

# Keep this section so mypy reads module-specific overrides below
# from setup.cfg.
[mypy]

# pygit2 is installed from apt in CI and does not ship type stubs
# or a py.typed marker. Keep this ignore scoped to pygit2 so mypy
# still checks moulin code.
[mypy-pygit2]
ignore_missing_imports = True
